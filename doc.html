<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Documents</title>
<style>
body { 
    margin:0; 
    font-family: Arial,sans-serif; 
    background:#f0f8ff; 
}

/* Header */
header {
    background:#0B3D91;
    color:white;
    padding:15px 20px;
    display:flex;
    align-items:center;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
}
header h1 {
    margin:0;
    font-size:1.5em;
    flex-grow:1;
    text-align:center;
}
.back-symbol {
    font-size:1.4em;
    cursor:pointer;
    margin-right:10px;
    user-select:none;
}

/* Container */
.container {
    max-width:900px;
    margin:20px auto;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:16px;
    padding: 0 12px;
}

/* Term buttons */
.button {
    display:flex;
    align-items:center;
    justify-content:center;
    background:white;
    color:#0B3D91;
    padding:20px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    text-align:center;
    box-shadow:0 3px 8px rgba(0,0,0,0.15);
    transition: transform 0.2s, background 0.2s;
}
.button:hover { 
    transform:translateY(-3px); 
    background:#e6f2ff; 
}

/* Course image cards */
.course-card {
    background:white;
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 3px 8px rgba(0,0,0,0.15);
    cursor:pointer;
    transition: transform 0.2s, box-shadow 0.2s;
}
.course-card:hover {
    transform:translateY(-3px);
    box-shadow:0 5px 14px rgba(0,0,0,0.2);
}
.course-card img {
    width:100%;
    height:140px;
    object-fit:cover;
    display:block;
    background:#dbeafe;
}
.course-title {
    padding:12px;
    text-align:center;
    font-weight:bold;
    color:#0B3D91;
    font-size:15px;
}

/* Document cards */
.doc-card {
    display:flex;
    align-items:center;
    background:white;
    color:#0B3D91;
    padding:15px 20px;
    margin:6px 0;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    box-shadow:0 3px 8px rgba(0,0,0,0.15);
    transition: transform 0.2s, background 0.2s;
    grid-column:1 / -1;
}
.doc-card:hover { 
    transform:translateY(-2px); 
    background:#e6f2ff; 
}

/* Fullscreen document viewer */
#docViewer {
    display:none;
    position:fixed;
    top:0; 
    left:0;
    width:100%;
    height:100%;
    background:white;
    z-index:1000;
}
#docViewer iframe {
    width:100%;
    height:100%;
    border:none;
}

/* Viewer buttons */
#viewerActions {
    position:absolute;
    top:10px;
    right:10px;
    display:flex;
    gap:10px;
    z-index:1001;
}

.viewer-btn {
    border:none;
    padding:14px 16px;
    font-weight:bold;
    border-radius:10px;
    cursor:pointer;
    color:white;
    font-size:14px;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

#downloadDoc {
    background:#0B3D91;
}
#downloadDoc:hover {
    background:#082f72;
}

#closeDoc {
    background:#f44336;
}
#closeDoc:hover { 
    background:#d32f2f; 
}

@media (max-width: 600px) {
    .container {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
    }

    .button {
        padding: 16px;
        font-size: 14px;
    }

    .course-card img {
        height:110px;
    }

    header h1 {
        font-size: 1.3em;
    }

    .viewer-btn {
        padding:12px 14px;
        font-size:13px;
    }
}
</style>
</head>
<body>

<header>
    <span id="backBtn" class="back-symbol" style="display:none;">←</span>
    <h1>Documents</h1>
</header>

<div class="container" id="content"></div>

<div id="docViewer">
    <div id="viewerActions">
        <button id="downloadDoc" class="viewer-btn">Download ⬇</button>
        <button id="closeDoc" class="viewer-btn">Close ✖</button>
    </div>
    <iframe id="docIframe"></iframe>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC1YH0tA8mO3qujnps8p5UbgMix91tO5-U",
  authDomain: "biochemistry-b4b77.firebaseapp.com",
  projectId: "biochemistry-b4b77",
  storageBucket: "biochemistry-b4b77.firebasestorage.app",
  messagingSenderId: "886538300649",
  appId: "1:886538300649:web:d2bfde3c4e141a95085478",
  measurementId: "G-GTYWCZTJMW"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let selectedTerm = null;
let selectedCourse = null;
let currentDocLink = "";

const content = document.getElementById("content");
const backBtn = document.getElementById("backBtn");
const docViewer = document.getElementById("docViewer");
const docIframe = document.getElementById("docIframe");
const closeDoc = document.getElementById("closeDoc");
const downloadDoc = document.getElementById("downloadDoc");

// LOCAL COURSE IMAGES FROM YOUR PROJECT FOLDER
const courseImages = {
    "BIO 110": "images/bio110.jpg",
    "BIO 120": "images/bio120.jpg",
    "BCH 210": "images/bch210.jpg",
    "BCH 220": "images/bch220.jpg",
    "PHY 110": "images/phy110.jpg",
    "CHE 110": "images/che110.jpg",
    "MTH 110": "images/mth110.jpg"
};

// Close document
closeDoc.onclick = () => {
    docViewer.style.display = "none";
    docIframe.src = "";
    currentDocLink = "";
};

// Download document
downloadDoc.onclick = () => {
    if (!currentDocLink) return;

    const a = document.createElement("a");
    a.href = currentDocLink;
    a.target = "_blank";
    a.rel = "noopener noreferrer";
    a.download = "";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
};

// Back button
backBtn.onclick = () => {
    if (docViewer.style.display === "block") {
        docViewer.style.display = "none";
        docIframe.src = "";
        currentDocLink = "";
        return;
    }

    if (selectedCourse) {
        selectedCourse = null;
        loadDocuments();
    } else if (selectedTerm) {
        selectedTerm = null;
        loadTerms();
    }
};

// Load all terms
function loadTerms() {
    content.innerHTML = "";
    backBtn.style.display = "none";

    db.collection("documents").get().then(snapshot => {
        const terms = [...new Set(snapshot.docs.map(d => d.data().term))].sort((a,b) => a-b);

        if (terms.length === 0) { 
            content.innerHTML = "<p style='padding:20px;text-align:center;'>No documents uploaded.</p>"; 
            return; 
        }

        terms.forEach(term => {
            const btn = document.createElement("button");
            btn.className = "button";
            btn.textContent = "Term " + term;
            btn.onclick = () => { 
                selectedTerm = term; 
                selectedCourse = null;
                loadDocuments(); 
            };
            content.appendChild(btn);
        });
    }).catch(error => {
        console.error("Error loading terms:", error);
        content.innerHTML = "<p style='padding:20px;text-align:center;color:red;'>Failed to load documents.</p>";
    });
}

// Load courses or documents
function loadDocuments() {
    content.innerHTML = "";
    backBtn.style.display = "inline-block";

    db.collection("documents")
      .where("term", "==", selectedTerm)
      .get()
      .then(snapshot => {
        if (snapshot.empty) { 
            content.innerHTML = "<p style='padding:20px;text-align:center;'>No documents found for this term.</p>"; 
            return; 
        }

        if (!selectedCourse) {
            // Show course image cards
            const courses = [...new Set(snapshot.docs.map(d => d.data().course))].sort();

            if (courses.length === 0) {
                content.innerHTML = "<p style='padding:20px;text-align:center;'>No courses found.</p>";
                return;
            }

            courses.forEach(course => {
                const imageUrl = courseImages[course] || "images/default-course.jpg";

                const card = document.createElement("div");
                card.className = "course-card";
                card.onclick = () => {
                    selectedCourse = course;
                    loadDocuments();
                };

                card.innerHTML = `
                    <img src="${imageUrl}" alt="${course}" onerror="this.src='images/default-course.jpg'">
                    <div class="course-title">${course}</div>
                `;

                content.appendChild(card);
            });

        } else {
            // Show documents for selected course
            const docs = snapshot.docs
                .filter(d => d.data().course === selectedCourse)
                .sort((a, b) => {
                    const oa = a.data().order || 999;
                    const ob = b.data().order || 999;
                    return oa - ob;
                });

            if (docs.length === 0) { 
                content.innerHTML = "<p style='padding:20px;text-align:center;'>No documents found for this course.</p>"; 
                return; 
            }

            docs.forEach(d => {
                const data = d.data();

                const card = document.createElement("div");
                card.className = "doc-card";
                card.textContent = data.order ? `${data.order}. ${data.title}` : data.title;
                card.onclick = () => openDocument(data.link);

                content.appendChild(card);
            });
        }
    }).catch(error => {
        console.error("Error loading documents:", error);
        content.innerHTML = "<p style='padding:20px;text-align:center;color:red;'>Failed to load documents.</p>";
    });
}

// Open document full-screen
function openDocument(link) {
    currentDocLink = link;
    docIframe.src = link;
    docViewer.style.display = "block";
}

// INIT
loadTerms();
</script>

</body>
</html>
